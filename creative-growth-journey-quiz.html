<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Creative Growth Journey Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #faf7f2; color: #1a1a1a; min-height: 100vh; }
#quiz-app { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }
.btn-primary { background: #3a9aa0; color: white; border: none; padding: 16px 40px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 20px rgba(58,154,160,0.3); display: inline-block; }
.btn-primary:hover { background: #2c7a80; }
.btn-secondary { background: transparent; color: #6b7280; border: 2px solid #e5e7eb; padding: 14px 32px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; }
.btn-secondary:hover { border-color: #3a9aa0; color: #3a9aa0; }
.btn-salmon { background: #e8806a; color: white; border: none; padding: 15px 20px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; }
.btn-salmon:hover { background: #d4694f; }
.progress-wrap { margin-bottom: 32px; }
.progress-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-label { font-size: 13px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; }
.progress-num { font-size: 13px; font-weight: 800; color: #3a9aa0; }
.progress-track { width: 100%; height: 8px; background: #e5e7eb; border-radius: 100px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #3a9aa0, #5bb8be); border-radius: 100px; transition: width 0.4s ease; }
.card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 4px 30px rgba(0,0,0,0.06); margin-bottom: 24px; }
.eyebrow { font-size: 12px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: #3a9aa0; margin-bottom: 12px; }
h1.quiz-title { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 44px); font-weight: 900; line-height: 1.15; margin-bottom: 16px; }
h1.quiz-title span { color: #3a9aa0; }
.subtitle { font-size: 16px; color: #6b7280; line-height: 1.6; margin-bottom: 28px; }
.divider { display: flex; align-items: center; gap: 12px; margin: 28px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
.q-number { font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #3a9aa0; margin-bottom: 12px; }
.q-text { font-family: 'Playfair Display', serif; font-size: clamp(18px, 3vw, 22px); font-weight: 700; line-height: 1.4; margin-bottom: 28px; }
.answers { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
.answer-option { background: #faf7f2; border: 2px solid #e5e7eb; border-radius: 14px; padding: 16px 20px; text-align: left; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; color: #1a1a1a; cursor: pointer; display: flex; align-items: center; gap: 14px; line-height: 1.4; width: 100%; }
.answer-option:hover { border-color: #3a9aa0; background: white; }
.answer-option.selected { border-color: #3a9aa0; background: rgba(58,154,160,0.06); color: #2c7a80; }
.answer-letter { width: 32px; height: 32px; border-radius: 50%; background: white; border: 2px solid #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #6b7280; flex-shrink: 0; }
.answer-option.selected .answer-letter { background: #3a9aa0; border-color: #3a9aa0; color: white; }
.nav-row { display: flex; justify-content: flex-end; gap: 12px; }
.result-stage-name { font-family: 'Playfair Display', serif; font-size: clamp(32px, 6vw, 52px); font-weight: 900; margin-bottom: 8px; text-align: center; }
.result-transition { font-size: 14px; color: #6b7280; font-style: italic; text-align: center; margin-bottom: 24px; }
.result-desc { font-size: 16px; line-height: 1.7; margin-bottom: 24px; }
.result-section h3 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; margin-bottom: 12px; }
.result-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.result-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 15px; line-height: 1.5; color: #6b7280; }
.result-list.feels li::before { content: '✦'; color: #3a9aa0; font-size: 10px; margin-top: 5px; flex-shrink: 0; }
.result-list.focus li::before { content: '→'; color: #e8806a; font-weight: 800; flex-shrink: 0; }
.transformation { background: rgba(58,154,160,0.08); border-left: 4px solid #3a9aa0; border-radius: 0 12px 12px 0; padding: 16px 20px; }
.transformation .t-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #3a9aa0; margin-bottom: 6px; }
.transformation p { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; font-style: italic; }
.journey-map-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 20px; }
.stages-path { display: flex; align-items: center; justify-content: center; overflow-x: auto; padding: 4px 0; }
.stage-node { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
.stage-bubble { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; background: #f3f4f6; opacity: 0.4; }
.stage-bubble.active { opacity: 1; transform: scale(1.15); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
.stage-name-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; opacity: 0.4; }
.stage-name-label.active { opacity: 1; }
.you-here { font-size: 9px; font-weight: 800; text-transform: uppercase; color: white; background: #1a1a1a; padding: 2px 7px; border-radius: 20px; }
.stage-arrow { font-size: 18px; color: #e5e7eb; margin: 0 4px; padding-bottom: 20px; }
.optin-card { background: linear-gradient(135deg, #3a9aa0, #2c7a80); border-radius: 20px; padding: 40px; text-align: center; color: white; box-shadow: 0 8px 40px rgba(58,154,160,0.3); margin-bottom: 16px; }
.optin-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; opacity: 0.8; margin-bottom: 12px; }
.optin-card h2 { font-family: 'Playfair Display', serif; font-size: clamp(22px, 4vw, 30px); font-weight: 900; margin-bottom: 12px; line-height: 1.3; }
.optin-card p { font-size: 15px; opacity: 0.9; line-height: 1.6; margin-bottom: 28px; }
.optin-inputs { display: flex; flex-direction: column; gap: 12px; max-width: 400px; margin: 0 auto 16px; }
.optin-inputs input { padding: 15px 20px; border-radius: 50px; border: none; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; color: #1a1a1a; outline: none; }
.optin-privacy { font-size: 12px; opacity: 0.7; }
.success-msg { background: rgba(255,255,255,0.15); border-radius: 16px; padding: 28px 20px; text-align: center; }
.retake-wrap { text-align: center; margin-top: 16px; }
.retake-btn { background: none; border: none; color: #6b7280; font-family: 'Nunito', sans-serif; font-size: 14px; cursor: pointer; text-decoration: underline; }
.next-step-btn { display: inline-block; padding: 14px 26px; background: #fff; color: #2c7a80; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; text-decoration: none; margin: 6px; transition: opacity 0.2s; }
.next-step-btn:hover { opacity: 0.88; }
.next-step-btn-outline { display: inline-block; padding: 13px 24px; background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.6); border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; text-decoration: none; margin: 6px; transition: opacity 0.2s; }
.next-step-btn-outline:hover { opacity: 0.8; }
@media (max-width: 480px) { .card { padding: 24px 16px; } .optin-card { padding: 28px 16px; } .stage-bubble { width: 44px; height: 44px; font-size: 16px; } }
</style>
</head>
<body>
<div id="quiz-app"></div>
<script>
var ZAPIER = 'https://hooks.zapier.com/hooks/catch/17715937/un81n65/';
var Qs = [
  {t:"How confident do you feel using Canva right now?",a:[{t:"I'm still learning the basics and often feel overwhelmed",s:"Learn"},{t:"I can use it pretty well, but I still second-guess myself sometimes",s:"Grow"},{t:"I'm confident using Canva for my business and creative projects",s:"Grow"}]},
  {t:"When you open Canva, how do you usually feel?",a:[{t:"Not sure where to start",s:"Learn"},{t:"I can get things done, but it still takes me longer than I want",s:"Grow"},{t:"I know what I'm doing and can usually create pretty efficiently",s:"Grow"}]},
  {t:"Which statement best describes your current content creation?",a:[{t:"I'm not posting consistently yet",s:"Learn"},{t:"I'm creating content, but it feels slow or inconsistent",s:"Grow"},{t:"I'm regularly creating content and have an established rhythm",s:"Grow"}]},
  {t:"How would you describe your visual brand right now?",a:[{t:"I don't really have one yet",s:"Learn"},{t:"I have some colors, fonts, or style ideas, but it's not very consistent",s:"Grow"},{t:"I have a clear visual style and use it regularly",s:"Grow"}]},
  {t:"When it comes to designing content, which feels most true?",a:[{t:"I mostly rely on templates because creating from scratch feels hard",s:"Learn"},{t:"I can customize designs, but I want them to look more polished",s:"Grow"},{t:"I can create strong visuals and adapt them for different needs",s:"Grow"}]},
  {t:"What is your biggest challenge right now?",a:[{t:"Learning Canva without feeling overwhelmed",s:"Learn"},{t:"Making content faster and more consistently",s:"Grow"},{t:"Turning what I create into something more strategic for my business",s:"Monetize"}]},
  {t:"Have you used your Canva skills to support your business in a meaningful way yet?",a:[{t:"I'm still learning and experimenting",s:"Learn"},{t:"Yes, mostly for my own content and branding",s:"Grow"},{t:"Yes, and I'm starting to use those skills more strategically",s:"Monetize"}]},
  {t:"Are you currently selling anything connected to your creativity, content, or Canva skills?",a:[{t:"No, not yet",s:"Grow"},{t:"Not really, but I've thought about it",s:"Monetize"},{t:"Yes, I already have something I sell, or I'm actively testing offers",s:"Monetize"}]},
  {t:"Which statement sounds most like you right now?",a:[{t:"I want to get comfortable creating good content first",s:"Grow"},{t:"I keep thinking I could probably make money with this, but I'm not sure how",s:"Monetize"},{t:"I already have offers or systems in place, and now I want to grow bigger",s:"Expand"}]},
  {t:"Have you created any digital products, templates, services, or offers yet?",a:[{t:"No",s:"Grow"},{t:"I have a few ideas or early experiments",s:"Monetize"},{t:"Yes, I already have at least one offer, product, or service",s:"Monetize"}]},
  {t:"How does your workflow feel when it comes to creating and managing content for your business?",a:[{t:"I don't really have a workflow yet, I just create things as I need them",s:"Grow"},{t:"I have some systems in place for planning and tracking, but they're inconsistent",s:"Manage"},{t:"My content workflow is pretty solid, and now I want to scale beyond just keeping up",s:"Expand"}]},
  {t:"Which best describes your main focus right now?",a:[{t:"Learning Canva and getting more confident",s:"Learn"},{t:"Creating better content and becoming more consistent",s:"Grow"},{t:"Scaling what I've already built and growing my reach or authority",s:"Expand"}]},
  {t:"How do you currently plan and track your social media content and business projects?",a:[{t:"I don't really track anything, I mostly wing it",s:"Grow"},{t:"I have a basic system, like a spreadsheet or simple planner, but it's not keeping up",s:"Manage"},{t:"I have a solid tracking system and I'm focused on using it to support bigger growth",s:"Expand"}]},
  {t:"When you think about your next level, what feels most exciting?",a:[{t:"Feeling more confident with Canva and design",s:"Learn"},{t:"Turning my creativity into income",s:"Monetize"},{t:"Expanding my visibility, offers, and opportunities",s:"Expand"}]},
  {t:"Which statement feels most like your current season?",a:[{t:"I'm learning the skills",s:"Learn"},{t:"I'm building confidence and momentum",s:"Grow"},{t:"I'm growing something bigger than just content — I'm building a real creative business",s:"Expand"}]}
];
var SD = {
  Learn:{color:"#6b8dd6",emoji:"💡",desc:"You're just getting started with Canva, or maybe you've poked around a bit but still feel like everyone else got the secret map and you didn't. Right now the platform can feel a little overwhelming, and you may not always know where to start. This stage is all about building confidence and getting comfortable enough to stop feeling intimidated every time you open Canva.",feels:["Canva feels helpful, but also a little confusing","You know you need graphics, but you're not sure how to make them well","You want someone to break things down in a simple, beginner-friendly way","You may compare yourself to people who make Canva look easy"],focus:["Learn the basic tools and understand how templates work","Get familiar with fonts, colors, spacing, and simple design structure","Build confidence one design at a time"],trans:"I understand Canva and can create simple designs."},
  Grow:{color:"#e8806a",emoji:"🌱",desc:"You can use Canva, but creating content still feels slower and more inconsistent than you'd like. You're no longer completely new, but you're not yet at the point where content feels easy or repeatable. You want your designs to look better, feel more like your brand, and take less time to create. This is where real momentum starts.",feels:["You can create content, but it takes longer than you want","Your graphics are improving, but they don't always feel polished","You want more consistency in your brand and content","You're trying to create regularly, but it can feel a little scattered"],focus:["Build a stronger visual style and brand consistency","Improve your design habits and make content creation faster","Use templates, brand tools, and repeatable workflows to your advantage"],trans:"I can create consistent, better content."},
  Monetize:{color:"#6abf8a",emoji:"💰",desc:"You're beginning to realize your Canva skills and creative ideas might be more than just helpful for your own business — they could become income. You may be wondering what you could sell, whether templates or digital products make sense for you, or how to turn your creativity into something more strategic. This is the exciting shift from creator to seller.",feels:["You're curious about digital products, templates, or creative offers","You want to make money with your skills, but you're not fully sure where to begin","You may already be testing ideas or sharing early offers","You're ready to think more strategically about what you create"],focus:["Focus on simple offers and practical product ideas","Test early concepts before building anything too big","Shift your mindset from consumer to creator"],trans:"I can turn my creativity into income."},
  Manage:{color:"#9b7fd4",emoji:"⚙️",desc:"You've built enough momentum that things are starting to feel messy. You may already have content, products, ideas, or multiple moving parts in your business, but the behind-the-scenes structure hasn't quite caught up. This stage is not about learning more Canva tricks — it's about making your business more manageable.",feels:["You have a lot going on, but not enough structure","You're trying to stay consistent, but things feel scattered","You need better planning, organization, or workflow systems","You want your business to feel smoother and less stressful"],focus:["Create systems for planning, organizing, and tracking your content","Build workflows that support what you're already creating","Make your business feel organized so you can grow without the chaos"],trans:"My business feels organized and manageable."},
  Expand:{color:"#3a9aa0",emoji:"📈",desc:"You've already built a strong foundation, and now you're thinking beyond simply creating content or keeping up with the day-to-day. You're asking bigger questions about growth, visibility, scale, and what comes next. You're no longer just learning, improving, or organizing — you're expanding.",feels:["You're thinking about visibility, reach, and authority","You want to grow something bigger than just content creation","You may be exploring collaborations, advanced programs, or higher-level strategy","You're ready to use what you've built as a platform for bigger opportunities"],focus:["Expand your offers, grow your audience, and increase your authority","Create strategic opportunities that move your business forward","Build on the foundation you already have — scale what's working"],trans:"I've built a scalable creative business."}
};
var SO = ["Learn","Grow","Monetize","Manage","Expand"];
var cQ = 0, ANS = [], topS = "Learn";

function R(html){ document.getElementById('quiz-app').innerHTML = html; }

function intro(){
  cQ=0; ANS=[];
  R('<div style="text-align:center;padding:20px 0">'+
    '<div class="eyebrow">The Creative Kat Studio</div>'+
    '<h1 class="quiz-title">The Creative Growth<br><span>Journey Quiz</span></h1>'+
    '<p class="subtitle">Discover where you are in your Canva and creative business journey, and what to focus on next.</p>'+
    '<button class="btn-primary" id="sb" type="button">Take the Quiz ✦</button>'+
    '<div class="divider"><span>🐱</span></div>'+
    '<p style="color:#6b7280;font-size:14px;line-height:1.7"><strong style="color:#1a1a1a">15 quick questions.</strong> No right or wrong answers.<br>Just an honest look at where you are right now.</p>'+
    '</div>');
  var sbtn = document.getElementById('sb');
  sbtn.addEventListener('click', function(e){ e.preventDefault(); showQ(0); }, false);
}

function showQ(i){
  cQ = i;
  var q = Qs[i], L = ['A','B','C'], pct = Math.round(((i+1)/15)*100);
  var aH = '';
  for(var j=0;j<q.a.length;j++){
    var sel = ANS[i]===j ? ' selected' : '';
    aH += '<button class="answer-option'+sel+'" data-i="'+j+'"><span class="answer-letter">'+L[j]+'</span><span>'+q.a[j].t+'</span></button>';
  }
  var dis = ANS[i]===undefined ? ' disabled style="opacity:0.4;cursor:not-allowed"' : '';
  var nL = i===14 ? 'See My Results →' : 'Next →';
  var bk = i>0 ? '<button class="btn-secondary" id="bb">← Back</button>' : '';
  R('<div class="progress-wrap">'+
    '<div class="progress-top"><span class="progress-label">Your Progress</span><span class="progress-num">'+(i+1)+' of 15</span></div>'+
    '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>'+
    '<div class="card">'+
    '<div class="q-number">Question '+(i+1)+'</div>'+
    '<div class="q-text">'+q.t+'</div>'+
    '<div class="answers">'+aH+'</div>'+
    '<div class="nav-row">'+bk+'<button class="btn-primary" id="nb"'+dis+'>'+nL+'</button></div>'+
    '</div>');
  var opts = document.querySelectorAll('.answer-option');
  for(var k=0;k<opts.length;k++){
    opts[k].onclick = (function(el,idx){
      return function(){
        ANS[cQ]=idx;
        var all=document.querySelectorAll('.answer-option');
        for(var m=0;m<all.length;m++) all[m].classList.remove('selected');
        el.classList.add('selected');
        var nb=document.getElementById('nb');
        nb.removeAttribute('disabled'); nb.removeAttribute('style');
      };
    })(opts[k], parseInt(opts[k].getAttribute('data-i')));
  }
  if(document.getElementById('bb')) document.getElementById('bb').onclick = function(){ showQ(cQ-1); };
  document.getElementById('nb').onclick = function(){
    if(ANS[cQ]===undefined) return;
    if(cQ<14){ showQ(cQ+1); } else { results(); }
  };
}

function results(){
  var sc={Learn:0,Grow:0,Monetize:0,Manage:0,Expand:0};
  for(var i=0;i<ANS.length;i++) if(ANS[i]!==undefined) sc[Qs[i].a[ANS[i]].s]++;
  var top='Learn',ts=0,sec='',ss=0;
  for(var s in sc){ if(sc[s]>ts){sec=top;ss=ts;top=s;ts=sc[s];}else if(sc[s]>ss){sec=s;ss=sc[s];} }
  topS=top;
  var d=SD[top], si=SO.indexOf(top), xi=SO.indexOf(sec);
  var tr = (ts-ss)<=2&&ss>0&&Math.abs(si-xi)===1 ? '<div class="result-transition">...with one foot stepping into '+sec+'</div>' : '';
  var fl=''; for(var i=0;i<d.feels.length;i++) fl+='<li>'+d.feels[i]+'</li>';
  var fo=''; for(var i=0;i<d.focus.length;i++) fo+='<li>'+d.focus[i]+'</li>';
  var mp='<div class="stages-path">';
  for(var i=0;i<SO.length;i++){
    var st=SO[i], ac=st===top;
    mp+='<div class="stage-node">'+
      '<div class="stage-bubble'+(ac?' active':'')+'" style="'+(ac?'background:'+SD[st].color+';':'')+'">'+SD[st].emoji+'</div>'+
      '<div class="stage-name-label'+(ac?' active':'')+'" style="'+(ac?'color:'+SD[st].color+';':'')+'">'+st+'</div>'+
      (ac?'<div class="you-here">You are here</div>':'')+
      '</div>';
    if(i<SO.length-1) mp+='<div class="stage-arrow">›</div>';
  }
  mp+='</div>';
  R('<div style="text-align:center;margin-bottom:28px">'+
    '<div class="eyebrow">Your Result</div>'+
    '<div class="result-stage-name" style="color:'+d.color+'">Stage '+(si+1)+': '+top+'</div>'+tr+'</div>'+
    '<div class="card" style="border-top:4px solid '+d.color+'">'+
    '<div class="result-desc">'+d.desc+'</div>'+
    '<div class="result-section"><h3>This stage often feels like...</h3><ul class="result-list feels">'+fl+'</ul></div>'+
    '<div class="transformation"><p style="font-family:Nunito,sans-serif;font-size:16px;font-weight:700;color:#2c7a80;">✦ Your next steps are waiting! Grab your free Creative Growth Journey Guide below and I\'ll show you exactly what to focus on in Stage '+(si+1)+': '+top+'.</p></div></div>'+
    '<div class="card"><div class="journey-map-title">Your Place in the Creative Growth Journey</div>'+mp+'</div>'+
    '<div class="optin-card">'+
    '<div class="optin-eyebrow">Free Download</div>'+
    '<h2>Get the Full Creative Growth Journey Guide</h2>'+
    '<p>See the complete roadmap for all five stages, what to focus on, and the exact next steps to move forward in your creative business.</p>'+
    '<div id="ow">'+
    '<div class="optin-inputs">'+
    '<input type="text" id="on" placeholder="First name">'+
    '<input type="email" id="oe" placeholder="Your email address">'+
    '<button class="btn-salmon" id="ob">Send Me the Guide 🩵</button>'+
    '</div><p class="optin-privacy">No spam, ever. Unsubscribe anytime.</p><p class="optin-privacy" style="margin-top:8px;">Please allow 5-10 minutes for your guide to arrive in your inbox.</p></div></div>'+
    '<div class="retake-wrap"><button class="retake-btn" id="rb">Retake the quiz</button></div>');

  document.getElementById('ob').onclick = function(){
    var n=document.getElementById('on').value.trim();
    var e=document.getElementById('oe').value.trim();
    if(!e||e.indexOf('@')<0){alert('Please enter a valid email address.');return;}
    document.getElementById('ob').textContent='Sending...';
    document.getElementById('ob').disabled=true;
    var tagIDs={Learn:18403244,Grow:18401602,Monetize:18403386,Manage:18403382,Expand:18403388};
    fetch(ZAPIER,{method:'POST',body:JSON.stringify({name:n,email:e,stage:'CGJ: '+topS,tag_id:tagIDs[topS]})}).catch(function(){});

    var stageMsg = {
      Learn: "You're in Stage 1: Learn. The Creative Content Vault was built for exactly where you are right now. Templates, group coaching, and a supportive community to help you build your Canva confidence one design at a time.",
      Grow: "You're in Stage 2: Grow. The Creative Content Vault is your perfect next step. Monthly resources and coaching to help you create faster, show up more consistently, and strengthen your visual brand.",
      Monetize: "You're in Stage 3: Monetize. You're ready for the Mastermind! It's designed specifically for creators who are ready to turn their creativity into income.",
      Manage: "You're in Stage 4: Manage. The Mastermind tier is where you belong. Themed coaching and the Airtable Social Media Planning System will help you build systems that support real, sustainable growth.",
